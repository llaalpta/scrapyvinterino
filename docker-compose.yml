services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vinted_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-vinted}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vinted}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinted} -d ${POSTGRES_DB:-vinted_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly yes --appendfsync always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    command: sh -c "alembic upgrade head && uvicorn vinted_monitor.api.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-vinted}:${POSTGRES_PASSWORD:-vinted}@postgres:5432/${POSTGRES_DB:-vinted_monitor}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
    command: python -m vinted_monitor.worker.main
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-vinted}:${POSTGRES_PASSWORD:-vinted}@postgres:5432/${POSTGRES_DB:-vinted_monitor}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "vinted_monitor.worker.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 35s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  scheduler-watchdog:
    build:
      context: ./backend
    command: python -m vinted_monitor.worker.watchdog
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-vinted}:${POSTGRES_PASSWORD:-vinted}@postgres:5432/${POSTGRES_DB:-vinted_monitor}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    command: sh -c "pnpm install --frozen-lockfile=false && pnpm dev"
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
