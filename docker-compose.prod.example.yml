services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build:
      context: ./backend
    env_file:
      - .env
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scrapyvinterino-api.rule=Host(`${APP_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.scrapyvinterino-api.entrypoints=websecure"
      - "traefik.http.routers.scrapyvinterino-api.tls=true"
      - "traefik.http.services.scrapyvinterino-api.loadbalancer.server.port=8000"
    depends_on:
      - postgres

  worker:
    build:
      context: ./backend
    command: python -m vinted_monitor.worker.main
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scrapyvinterino.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.scrapyvinterino.entrypoints=websecure"
      - "traefik.http.routers.scrapyvinterino.tls=true"
      - "traefik.http.services.scrapyvinterino.loadbalancer.server.port=80"
    depends_on:
      - api

volumes:
  postgres-data:

networks:
  internal:
  traefik:
    external: true
